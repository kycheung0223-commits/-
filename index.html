<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天命最高 - Mandate Supreme (純淨修復版)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { background-color: #030202; color: #e2e8f0; font-family: 'Noto Serif TC', serif; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }

        #game-stage {
            width: 1024px; height: 768px; border: 5px double #b8860b; box-shadow: 0 0 60px rgba(0,0,0,1); position: relative; display: flex; flex-direction: column; justify-content: space-between; overflow: hidden;
            background: 
                radial-gradient(circle at 50% 30%, rgba(212, 175, 55, 0.15) 0%, transparent 60%),
                linear-gradient(180deg, rgba(0,0,0,0.8) 0%, rgba(13, 9, 6, 0.4) 40%, rgba(26, 18, 12, 0.9) 90%),
                #0a0705;
        }

        .panel { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; z-index: 10; }
        .hidden { display: none !important; }

        /* 頂部 四大國力 HUD Display */
        .hud-header { width: 100%; height: 75px; background: linear-gradient(180deg, #0f0a05 0%, rgba(28, 20, 12, 0.95) 100%); border-bottom: 2px solid #d4af37; display: flex; justify-content: space-around; align-items: center; padding: 0 40px; z-index: 20; }
        .hud-turn { font-family: 'Ma Shan Zheng', cursive; font-size: 26px; color: #ffd700; border-right: 1px solid #4a351a; padding-right: 25px; min-width: 130px; }
        .stat-box { display: flex; align-items: center; gap: 10px; width: 165px; position: relative; }
        .stat-icon { width: 34px; height: 34px; background: #23150b; border: 1px solid #d4af37; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: #ffd700; }
        .stat-body { flex-grow: 1; }
        .stat-label-container { display: flex; justify-content: space-between; font-size: 13px; color: #cbd5e1; margin-bottom: 4px; font-weight: bold; }
        .stat-bar-bg { width: 100%; height: 7px; background: #111; border: 1px solid #4a351a; border-radius: 4px; overflow: hidden; }
        .stat-bar-fill { height: 100%; width: 50%; background: linear-gradient(90deg, #8b0000, #d4af37); transition: width 0.3s ease; }
        .stat-trend { position: absolute; right: -5px; top: -12px; font-size: 12px; font-weight: bold; display: none; }
        .trend-up { color: #52c41a; display: block; }
        .trend-down { color: #f5222d; display: block; }

        /* 朝堂大政與隨機事件區 */
        .court-stage { flex-grow: 1; display: flex; flex-direction: column; justify-content: flex-start; align-items: center; padding: 30px 60px; z-index: 15; }
        .empire-banner { font-family: 'Ma Shan Zheng', cursive; font-size: 36px; color: #ffffff; letter-spacing: 12px; margin-bottom: 25px; text-shadow: 0 0 10px rgba(212,175,55,0.5); }
        .scroll-container { width: 760px; background: linear-gradient(180deg, rgba(24, 18, 12, 0.96) 0%, rgba(14, 10, 6, 0.98) 100%); border: 2px solid #d4af37; border-radius: 4px; padding: 25px 40px; text-align: center; margin-bottom: 40px; }
        .scroll-title { font-family: 'Ma Shan Zheng', cursive; font-size: 26px; color: #ffd700; margin-bottom: 12px; }
        .scroll-desc { font-size: 17px; line-height: 1.6; color: #f0e6d2; text-align: justify; }

        /* 三大臣奏折卡片 */
        .proposals-grid { width: 860px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
        .memorial-card { border-radius: 4px; padding: 22px 16px; cursor: pointer; transition: transform 0.2s ease, border-color 0.2s ease; position: relative; text-align: center; min-height: 210px; display: flex; flex-direction: column; }
        .civil-card { background: linear-gradient(180deg, #142030 0%, #0a0f19 100%); border: 2px solid #2b4c7e; }
        .eco-card { background: linear-gradient(180deg, #302614 0%, #19140a 100%); border: 2px solid #8c6d31; }
        .mil-card { background: linear-gradient(180deg, #321616 0%, #190a0a 100%); border: 2px solid #8e2b2b; }
        .memorial-tag { position: absolute; top: -11px; left: 50%; transform: translateX(-50%); padding: 1px 14px; font-size: 12px; font-weight: bold; border-radius: 12px; border: 1px solid #d4af37; }
        .tag-civil { background: #1a365d; color: #63b3ed; }
        .tag-eco { background: #4a3716; color: #f6ad55; }
        .tag-military { background: #5c1d1d; color: #fc8181; }
        .memorial-icon { font-size: 24px; margin-top: 8px; margin-bottom: 6px; }
        .civil-card .memorial-icon { color: #63b3ed; }
        .eco-card .memorial-icon { color: #f6ad55; }
        .mil-card .memorial-icon { color: #fc8181; }
        .memorial-author { font-family: 'Ma Shan Zheng', cursive; font-size: 20px; color: #f0e6d2; margin-bottom: 10px; border-bottom: 1px solid rgba(212,175,55,0.2); padding-bottom: 4px; }
        .memorial-text { font-size: 14px; line-height: 1.5; color: #cbd5e1; text-align: left; }
        .memorial-card:hover { transform: translateY(-8px); border-color: #ffd700; }

        /* 底部 編年史日誌 */
        .chronicle-log-bar { width: 100%; height: 45px; background: #0a0603; border-top: 2px solid #d4af37; display: flex; align-items: center; padding: 0 40px; font-size: 14px; color: #cbd5e1; z-index: 20; }
        .chronicle-log-bar i { color: #ffd700; margin-right: 12px; }

        /* 結局畫面 */
        #gameover-panel { justify-content: center; align-items: center; background: #070504; }
        .go-title { font-family: 'Ma Shan Zheng', cursive; font-size: 64px; color: #e53e3e; margin-bottom: 15px; }
        .go-reason { font-size: 24px; color: #ffd700; font-family: 'Ma Shan Zheng', cursive; margin-bottom: 35px; }
        .go-desc-box { width: 660px; background: rgba(15, 10, 7, 0.96); border: 1px solid #d4af37; padding: 25px; text-align: justify; margin-bottom: 40px; line-height: 1.6; color: #ebdcb9; }
        .royal-btn { background: linear-gradient(180deg, #4a0d0d 0%, #1c0303 100%); border: 2px solid #d4af37; color: #f0e6d2; padding: 14px 50px; font-size: 22px; font-family: 'Noto Serif TC', serif; font-weight: bold; cursor: pointer; letter-spacing: 4px; }
    </style>
</head>
<body>

    <div id="game-stage">
        
        <div id="game-panel" class="panel">
            <div class="hud-header">
                <div id="hud-turn-display" class="hud-turn">宣德 元年</div>
                
                <div class="stat-box">
                    <div class="stat-icon"><i class="fa-solid fa-scroll"></i></div>
                    <div class="stat-body">
                        <div class="stat-label-container"><span>政治</span><span id="val-pol">50</span></div>
                        <div class="stat-bar-bg"><div id="bar-pol" class="stat-bar-fill"></div></div>
                    </div>
                    <div id="trend-pol" class="stat-trend"></div>
                </div>

                <div class="stat-box">
                    <div class="stat-icon"><i class="fa-solid fa-coins"></i></div>
                    <div class="stat-body">
                        <div class="stat-label-container"><span>經濟</span><span id="val-eco">50</span></div>
                        <div class="stat-bar-bg"><div id="bar-eco" class="stat-bar-fill"></div></div>
                    </div>
                    <div id="trend-eco" class="stat-trend"></div>
                </div>

                <div class="stat-box">
                    <div class="stat-icon"><i class="fa-solid fa-shield-halved"></i></div>
                    <div class="stat-body">
                        <div class="stat-label-container"><span>國防</span><span id="val-mil">50</span></div>
                        <div class="stat-bar-bg"><div id="bar-mil" class="stat-bar-fill"></div></div>
                    </div>
                    <div id="trend-mil" class="stat-trend"></div>
                </div>

                <div class="stat-box">
                    <div class="stat-icon"><i class="fa-solid fa-book-open"></i></div>
                    <div class="stat-body">
                        <div class="stat-label-container"><span>文化</span><span id="val-cul">50</span></div>
                        <div class="stat-bar-bg"><div id="bar-cul" class="stat-bar-fill"></div></div>
                    </div>
                    <div id="trend-cul" class="stat-trend"></div>
                </div>
            </div>

            <div class="court-stage">
                <div class="empire-banner">👑 大華帝國 · 奉天承運</div>
                
                <div class="scroll-container">
                    <h2 id="current-event-title" class="scroll-title">載入中...</h2>
                    <p id="current-event-desc" class="scroll-desc">正在召集文武百官，請稍候...</p>
                </div>

                <div class="proposals-grid">
                    <div class="memorial-card civil-card" onclick="makeChoice(0)" onmouseenter="showTrend(0)" onmouseleave="hideTrend()">
                        <div class="memorial-tag tag-civil">📜 主和派奏折</div>
                        <div class="memorial-icon"><i class="fa-solid fa-feather-pointed"></i></div>
                        <div class="memorial-author">文華殿大學士</div>
                        <p id="prop-civil" class="memorial-text">載入中...</p>
                    </div>

                    <div class="memorial-card eco-card" onclick="makeChoice(1)" onmouseenter="showTrend(1)" onmouseleave="hideTrend()">
                        <div class="memorial-tag tag-eco">📜 權宜派奏折</div>
                        <div class="memorial-icon"><i class="fa-solid fa-scale-balanced"></i></div>
                        <div class="memorial-author">戶部尚書</div>
                        <p id="prop-eco" class="memorial-text">載入中...</p>
                    </div>

                    <div class="memorial-card mil-card" onclick="makeChoice(2)" onmouseenter="showTrend(2)" onmouseleave="hideTrend()">
                        <div class="memorial-tag tag-military">📜 主戰派奏折</div>
                        <div class="memorial-icon"><i class="fa-solid fa-sword"></i></div>
                        <div class="memorial-author">兵部大將軍</div>
                        <p id="prop-military" class="memorial-text">載入中...</p>
                    </div>
                </div>
            </div>

            <div id="history-bar-log" class="chronicle-log-bar">
                <i class="fa-solid fa-pen-nib"></i> 宣德元年，聖上登基，四海昇平，萬象更新。
            </div>
        </div>

        <div id="gameover-panel" class="panel hidden">
            <h1 id="go-title-text" class="go-title">天命崩解</h1>
            <div id="go-reason-text" class="go-reason">權力失衡</div>
            <div class="go-desc-box"><p id="go-summary-text">歷史發生偏折...</p></div>
            <button class="royal-btn" onclick="restartGame()">重新登基</button>
        </div>

    </div>

    <script>
        let stats = { pol: 50, eco: 50, mil: 50, cul: 50 };
        let currentTurn = 1;
        let eventPool = [];
        let currentEvent = null;

        const baseEvents = [
            {
                title: "匈奴突襲寇邊",
                desc: "邊關十萬火急！北面匈奴趁大寒南下狂飆掠奪，已連破我朝九邊兩處哨口，守軍告急！",
                choices: [
                    { txt: "「割地和親、增修互市，遣使修好以文德懷遠。」", effect: { pol: 15, eco: -15, mil: -15, cul: 15 }, log: "增開互市懷柔北疆，文官讚譽天子仁德，但邊防武備日漸削弱。" },
                    { txt: "「暫緩出兵，徵調邊郡富商承包鹽利以籌集防禦加固軍費。」", effect: { pol: -10, eco: 20, mil: 5, cul: -5 }, log: "戶部通過讓利商賈籌集了防禦銀兩，暫時穩固財政，但官場法度受到動搖。" },
                    { txt: "「發兵迎擊！點將十萬迎戰，大破匈奴以正國威！」", effect: { pol: -5, eco: -25, mil: 25, cul: -5 }, log: "大將軍親率精騎北伐大勝匈奴，軍威大振，但國庫開支極其巨大。" }
                ]
            },
            {
                title: "黃河突發大決堤",
                desc: "山東遭遇連日罕見暴雨，黃河數處長堤同時崩塌決口，數十萬流民無家可歸，賑災刻不容緩。",
                choices: [
                    { txt: "「派翰林儒生開倉放糧、安撫難民，倡導仁政慈悲。」", effect: { pol: 15, eco: -20, mil: 0, cul: 15 }, log: "儒生介入全面發放公糧，災區民心大定，朝野稱頌聖上聖德。" },
                    { txt: "「允許地方豪強承包河道修築，賜予鬻爵免稅權換取賑災現銀。」", effect: { pol: -15, eco: 25, mil: -5, cul: -5 }, log: "通過售賣官爵迅速籌得巨資，國庫充盈，但損害了吏部考課制度。" },
                    { txt: "「出動地方守備軍強力封鎖災區，徵用壯丁強行修堤，彈壓騷亂。」", effect: { pol: -5, eco: -5, mil: 20, cul: -15 }, log: "守備軍實施鐵腕管制與強制修堤，雖然效率極高，但引發地方斯文掃地。" }
                ]
            },
            {
                title: "江南科場舞弊案",
                desc: "江南鄉試爆出驚天醜聞，主考官涉嫌收受鹽商巨額賄賂，向特定豪門子弟洩漏試題。",
                choices: [
                    { txt: "「由禮部重新開科，重申儒家公正，洗刷讀書人處境。」", effect: { pol: 20, eco: -5, mil: 0, cul: 15 }, log: "重新開科維護了仕子公正，天下文風大盛，文臣高呼萬歲。" },
                    { txt: "「將涉案豪商處以巨額罰銀，沒收財產入國庫，涉案官員降職。」", effect: { pol: -15, eco: 30, mil: -5, cul: -5 }, log: "沒收貪墨資產，國庫瞬間爆滿，但科舉威信下降引發士林議論。" },
                    { txt: "http「此乃動搖國本！著兵部與特務機構介入，通通滿門抄斬。」", effect: { pol: 10, eco: -5, mil: 20, cul: -15 }, log: "武將和特務全面血洗江南官場，殺一儆百，軍威雷霆震懾朝廷。" }
                ]
            },
            {
                title: "絲綢之路商路糾紛",
                desc: "西方諸國商隊在大華邊境遭遇地方守將橫徵暴斂，威脅要斷絕往來，商路即將停擺。",
                choices: [
                    { txt: "「派遣儒家禮部使節厚賞各國商隊，下詔責罰地方將領。」", effect: { pol: 15, eco: -15, mil: -10, cul: 20 }, log: "朝廷以外交厚賜安撫商隊，萬邦來朝之名大盛，但前線守軍士氣低落。" },
                    { txt: "「將西域商路全面改為官營壟斷，課以重稅以充實內帑。」", effect: { pol: -10, eco: 30, mil: -5, cul: -5 }, log: "商路官營讓朝廷賺取了海量財富，國庫充盈，但邊境走私卻日益猖獗。" },
                    { txt: "「直接關閉西域關卡，調遣大軍加強戍邊，全面禁絕外夷。」", effect: { pol: -5, eco: -20, mil: 25, cul: -10 }, log: "天子下令閉關鎖國，邊防武備達到了頂峰，但往來貿易徹底斷絕。" }
                ]
            }
        ];

        // 頁面載入完畢立刻無縫初始化並執行
        window.onload = function() {
            stats = { pol: 50, eco: 50, mil: 50, cul: 50 };
            currentTurn = 1;
            eventPool = [...baseEvents];
            updateHUD();
            nextEvent();
        };

        function updateHUD() {
            document.getElementById('hud-turn-display').innerText = `宣德 ${convertToChineseYear(currentTurn)}年`;
            const keys = ['pol', 'eco', 'mil', 'cul'];
            keys.forEach(k => {
                document.getElementById(`val-${k}`).innerText = stats[k];
                document.getElementById(`bar-${k}`).style.width = stats[k] + '%';
                document.getElementById(`bar-${k}`).style.background = stats[k] <= 20 ? 
                    "linear-gradient(90deg, #ff0000, #8b0000)" : "linear-gradient(90deg, #8b0000, #d4af37)";
            });
        }

        function convertToChineseYear(num) {
            const arr = ["", "元", "二", "三", "四", "五", "六", "七", "八", "九", "十"];
            return num <= 10 ? arr[num] : num;
        }

        function nextEvent() {
            if (eventPool.length === 0) eventPool = [...baseEvents];
            let idx = Math.floor(Math.random() * eventPool.length);
            currentEvent = eventPool.splice(idx, 1)[0];

            document.getElementById('current-event-title').innerText = `當前朝政大政 · ${currentEvent.title}`;
            document.getElementById('current-event-desc').innerText = currentEvent.desc;

            document.getElementById('prop-civil').innerText = currentEvent.choices[0].txt;
            document.getElementById('prop-eco').innerText = currentEvent.choices[1].txt;
            document.getElementById('prop-military').innerText = currentEvent.choices[2].txt;
            hideTrend();
        }

        function makeChoice(index) {
            let choice = currentEvent.choices[index];
            for(let key in choice.effect) {
                stats[key] = Math.max(0, Math.min(100, stats[key] + choice.effect[key]));
            }

            // 更新編年史日誌
            document.getElementById('history-bar-log').innerHTML = `<i class="fa-solid fa-pen-nib"></i> 宣德${convertToChineseYear(currentTurn)}年：${choice.log}`;
            updateHUD();

            if (checkGameOver()) return;

            currentTurn++;
            nextEvent();
        }

        function showTrend(choiceIndex) {
            if (!currentEvent) return;
            hideTrend();
            let effect = currentEvent.choices[choiceIndex].effect;
            for (let key in effect) {
                let trendEl = document.getElementById(`trend-${key}`);
                if (trendEl) {
                    if (effect[key] > 0) { trendEl.innerText = "▲"; trendEl.className = "stat-trend trend-up"; }
                    else if (effect[key] < 0) { trendEl.innerText = "▼"; trendEl.className = "stat-trend trend-down"; }
                }
            }
        }

        function hideTrend() {
            const keys = ['pol', 'eco', 'mil', 'cul'];
            keys.forEach(k => {
                let trendEl = document.getElementById(`trend-${k}`);
                if (trendEl) { trendEl.innerText = ""; trendEl.className = "stat-trend"; }
            });
        }

        function checkGameOver() {
            let dead = false; let reason = ""; let sum = "";

            if (stats.pol <= 0) {
                reason = "【政治清明歸零 · 朝臣架空】";
                sum = "內閣與文官集團聯手發動逼宮，奪走了皇權玉璽，您被軟禁於瀛台，大華江山易主。";
                dead = true;
            } else if (stats.eco <= 0) {
                reason = "【經濟生產歸零 · 財政崩潰】";
                sum = "國庫徹底掏空，邊防軍餉無法發放。各地爆發百萬流民起義，大華朝宣告覆滅。";
                dead = true;
            } else if (stats.mil <= 0) {
                reason = "【國防武備歸零 · 外敵破關】";
                sum = "九邊重鎮武備荒廢。匈奴三十萬鐵騎趁夜破關長驅直入，攻破紫禁城，江山斷絕。";
                dead = true;
            } else if (stats.cul <= 0) {
                reason = "【文化傳承歸零 · 禮崩樂壞】";
                sum = "天下斯文掃地、禮崩樂壞。朝廷喪失合法性，各地宗室割據舉兵，天下大亂。";
                dead = true;
            } else if (currentTurn >= 10) {
                document.getElementById('game-panel').classList.add('hidden');
                document.getElementById('gameover-panel').classList.remove('hidden');
                document.getElementById('go-title-text').innerText = "✨ 天命最高 ✨";
                document.getElementById('go-reason-text').innerText = "【功蓋千秋 · 打造萬世盛世】";
                document.getElementById('go-summary-text').innerText = "聖上在位十載，文治武功皆臻化境！大華帝國成功延續了至高天命，史稱「宣德盛世」！";
                return true;
            }

            if (dead) {
                document.getElementById('game-panel').classList.add('hidden');
                document.getElementById('gameover-panel').classList.remove('hidden');
                document.getElementById('go-title-text').innerText = "天命崩解";
                document.getElementById('go-reason-text').innerText = reason;
                document.getElementById('go-summary-text').innerText = sum;
                return true;
            }
            return false;
        }

        function restartGame() {
            document.getElementById('gameover-panel').classList.add('hidden');
            document.getElementById('game-panel').classList.remove('hidden');
            stats = { pol: 50, eco: 50, mil: 50, cul: 50 };
            currentTurn = 1;
            eventPool = [...baseEvents];
            updateHUD();
            nextEvent();
        }
    </script>
</body>
</html>
