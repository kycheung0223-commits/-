<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天命最高 · 大殿覲見版</title>
    <style>
        :root {
            --bg-dark: #070504;
            --stage-bg: #140d08;
            --accent-gold: #f3ca65;
            --accent-red: #cc3333;
            --text-main: #f7fafc;
            --text-muted: #a0aec0;
            --color-pol: #3182ce;
            --color-eco: #38a169;
            --color-def: #e53e3e;
            --color-cul: #805ad5;
        }
        * { box-sizing: border-box; user-select: none; }
        
        body { 
            background-color: var(--bg-dark); 
            background-image: radial-gradient(circle at 50% 30%, #3a220e 0%, #070504 80%);
            color: var(--text-main); 
            font-family: "Microsoft JhengHei", sans-serif; 
            margin: 0; padding: 0; 
            height: 100vh; 
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }
        
        /* 📺 16:9 劇院級朝堂舞台 */
        .game-stage {
            width: 1024px;
            height: 640px;
            background-color: var(--stage-bg);
            /* 👑 畫面中央自帶龍椅主圖光影 */
            background-image: 
                linear-gradient(to top, rgba(10, 5, 2, 0.95) 0%, rgba(30, 15, 5, 0.2) 50%, rgba(10, 5, 2, 0.8) 100%),
                radial-gradient(circle at 50% 35%, rgba(243, 202, 101, 0.2) 0%, transparent 50%);
            border: 6px solid #3d2919;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.9);
            position: relative;
            overflow: hidden;
        }
        
        /* 💥 玉璽震動特効 */
        .shake { animation: screenShake 0.4s cubic-bezier(.36,.07,.19,.97) both; }

        /* 👑 頂部 HUD 化狀態欄 */
        .top-hud { 
            height: 60px; background: #0f0a06; 
            border-bottom: 2px solid var(--accent-gold); padding: 0 25px; 
            display: flex; justify-content: space-between; align-items: center;
            position: relative; z-index: 10;
        }
        .hud-stats { display: flex; gap: 25px; }
        .hud-box { width: 130px; }
        .hud-label { font-size: 0.8rem; margin-bottom: 3px; display: flex; justify-content: space-between; color: #e2e8f0; }
        .hud-bar { background: #000; height: 8px; border: 1px solid #5c4028; border-radius: 2px; overflow: hidden; }
        .hud-fill { height: 100%; width: 50%; transition: width 0.4s ease-out; }

        /* 👑 龍椅中央主圖意象標記 */
        .dragon-throne-center {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            width: 220px; height: 180px; opacity: 0.15; pointer-events: none;
            background: var(--accent-gold);
            clip-path: polygon(50% 0%, 100% 30%, 85% 100%, 15% 100%, 0% 30%);
            z-index: 1;
        }

        /* 📜 太監宣讀聖旨懸浮對話框 */
        .eunuch-decree-panel {
            width: 700px; background: rgba(20, 14, 9, 0.95);
            border: 2px solid var(--accent-gold); border-radius: 6px;
            margin: 20px auto 0 auto; padding: 15px 20px; position: relative; z-index: 5;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            display: flex; gap: 20px; align-items: center;
            animation: floatGently 3s ease-in-out infinite alternate;
        }
        .eunuch-avatar {
            width: 50px; height: 50px; background: #2c1d12; border: 2px solid var(--accent-gold);
            border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
        }
        .decree-body { flex: 1; }
        .decree-title { font-size: 1.05rem; font-weight: bold; color: var(--accent-gold); margin-bottom: 4px; }
        .decree-text { font-size: 0.9rem; line-height: 1.5; color: #f0e6df; }

        /* 🎴 朝臣立繪交互舞台（位於畫面下方） */
        .court-advisors-floor {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 340px;
            display: flex; justify-content: center; align-items: flex-end; gap: 60px;
            padding-bottom: 20px; z-index: 4;
        }
        
        /* 大臣立繪卡牌 */
        .advisor-silhouette {
            width: 180px; height: 280px; position: relative;
            cursor: pointer; display: flex; flex-direction: column; justify-content: flex-end; align-items: center;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            transform-origin: bottom center; filter: brightness(0.5);
        }
        
        /* 使用純 CSS 漸層勾勒出的精緻卡牌剪影 */
        .advisor-figure {
            position: absolute; bottom: 50px; width: 100px; height: 180px;
            background: linear-gradient(to top, #150f0a, #3a2717);
            border-radius: 30px 30px 5px 5px; box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .advisor-figure::before { /* 頭部 */
            content: ""; position: absolute; top: -30px; left: 50%; transform: translateX(-50%);
            width: 40px; height: 40px; background: inherit; border-radius: 50%;
        }

        /* 三位大臣的不同視覺與服制符號 */
        .tg-civil .advisor-figure { background: linear-gradient(to top, #111a16, #234233); }
        .tg-civil .advisor-figure::after { content: "🎩"; position: absolute; top: -45px; left: 50%; transform: translateX(-50%); font-size: 1.2rem; }
        
        .tg-military .advisor-figure { background: linear-gradient(to top, #1c1414, #4a1d1d); border-radius: 25px 25px 5px 5px; }
        .tg-military .advisor-figure::after { content: "🪖"; position: absolute; top: -45px; left: 50%; transform: translateX(-50%); font-size: 1.2rem; }
        
        .tg-censor .advisor-figure { background: linear-gradient(to top, #16121e, #36284d); width: 90px; }
        .tg-censor .advisor-figure::after { content: "📜"; position: absolute; top: 10px; right: -8px; font-size: 1.1rem; transform: rotate(15deg); }

        /* 大臣底座名字標籤 */
        .advisor-label {
            background: rgba(15, 10, 6, 0.95); border: 1px solid #5c4028;
            padding: 5px 10px; border-radius: 3px; text-align: center; width: 100%;
            z-index: 2; box-shadow: 0 4px 6px rgba(0,0,0,0.6);
        }
        .label-role { font-size: 0.7rem; color: var(--text-muted); }
        .label-name { font-size: 0.85rem; color: var(--accent-gold); font-weight: bold; }

        /* ⚡ 操作反饋一：滑鼠懸停微調 */
        .advisor-silhouette:hover { filter: brightness(0.8); }

        /* ⚡ 操作反饋二：選中的大臣向前走一步（放大、高亮、上升） */
        .advisor-silhouette.stepped-forward {
            filter: brightness(1.2) !important;
            transform: translateY(-30px) scale(1.12);
            z-index: 10;
        }
        .advisor-silhouette.stepped-forward .advisor-label { border-color: var(--accent-gold); }

        /* ⚡ 操作反饋三：當某人走上前，其他兩位大臣面露不悅並退下變暗 */
        .court-advisors-floor.has-active-selection .advisor-silhouette:not(.stepped-forward) {
            filter: brightness(0.15) contrast(0.7) !important;
            transform: translateY(20px) scale(0.9);
            opacity: 0.3;
            pointer-events: none; /* 防止退下的朝臣被誤點 */
        }

        /* 📜 彈出式具體主張奏摺（取代傳統網頁表單按鈕） */
        .proposal-scroll-popup {
            position: absolute; bottom: 95px; left: 50%; transform: translateX(-50%) scale(0.85);
            width: 460px; background: #ebdcc5; color: #2a1a0a; padding: 15px 20px;
            border-radius: 4px; box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            display: none; flex-direction: column; gap: 12px; z-index: 20;
            border-left: 10px solid #9c2919; border-right: 10px solid #9c2919;
            opacity: 0; transition: all 0.25s ease-out;
        }
        .proposal-scroll-popup.show { display: flex; opacity: 1; transform: translateX(-50%) scale(1); }
        .proposal-text { font-style: italic; font-weight: bold; font-size: 0.92rem; line-height: 1.5; color: #3d250c; border-bottom: 1px dashed #bba58d; padding-bottom: 6px; }
        .proposal-preview-bars { display: flex; gap: 10px; font-size: 0.78rem; font-weight: bold; justify-content: center; }
        .badge-eff { padding: 2px 6px; border-radius: 2px; color: #fff; }
        .badge-up { background: #2f855a; } .badge-down { background: #c53030; }
        
        .action-confirm-btn {
            background: #9c2919; color: #fff; border: 1px solid #6b170c; padding: 7px 0;
            font-size: 0.95rem; font-weight: bold; letter-spacing: 3px; border-radius: 2px;
            cursor: pointer; text-align: center; box-shadow: 0 3px 0 #521309;
        }
        .action-confirm-btn:hover { background: #b8321f; }
        .action-confirm-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #521309; }

        /* 🔴 玉璽御批大印 */
        .seal-stamp {
            position: absolute; top: 10px; right: 20px; width: 75px; height: 75px;
            border: 3px double #cc3333; color: #cc3333; font-size: 1.2rem; font-weight: 900;
            display: flex; align-items: center; justify-content: center; transform: rotate(-12deg) scale(3);
            opacity: 0; border-radius: 6px; font-family: "標楷體", serif; pointer-events: none;
        }
        @keyframes sealPlunge {
            0% { transform: rotate(-12deg) scale(3); opacity: 0; }
            100% { transform: rotate(-12deg) scale(1); opacity: 0.85; }
        }

        /* 🏛️ 歷史鏡鑑歷史彈窗 */
        .history-modal { 
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.85); z-index: 100; justify-content: center; align-items: center; 
        }
        .modal-box { width: 550px; background: #1a110b; border: 2px solid var(--accent-gold); padding: 20px; box-shadow: 0 0 25px #000; }
        .modal-title { font-size: 1.1rem; color: var(--accent-gold); font-weight: bold; margin-bottom: 12px; border-bottom: 1px dashed #5c4028; padding-bottom: 6px; }
        .modal-body { font-size: 0.9rem; line-height: 1.6; color: #e2e8f0; margin-bottom: 15px; }
        .modal-close-btn { background: var(--accent-gold); color: #000; border: none; padding: 8px 20px; font-size: 0.9rem; cursor: pointer; font-weight: bold; }

        /* 動畫 */
        @keyframes floatGently { from { transform: translateY(3px); } to { transform: translateY(-3px); } }
        @keyframes screenShake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(3px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
    </style>
</head>
<body>

    <div class="game-stage" id="main-stage">

        <div class="top-hud">
            <div style="font-size: 1.1rem; font-weight: 900; color: var(--accent-gold); letter-spacing: 1px;">大華帝國 · 朝堂點將</div>
            <div class="hud-stats">
                <div class="hud-box">
                    <div class="hud-label">🏛️ 政治 <span id="v-politics">50</span></div>
                    <div class="hud-bar"><div id="b-politics" class="hud-fill" style="background-color:var(--color-pol)"></div></div>
                </div>
                <div class="hud-box">
                    <div class="hud-label">💰 經濟 <span id="v-economy">50</span></div>
                    <div class="hud-bar"><div id="b-economy" class="hud-fill" style="background-color:var(--color-eco)"></div></div>
                </div>
                <div class="hud-box">
                    <div class="hud-label">⚔️ 國防 <span id="v-defense">50</span></div>
                    <div class="hud-bar"><div id="b-defense" class="hud-fill" style="background-color:var(--color-def)"></div></div>
                </div>
            </div>
            <div style="font-size: 0.85rem; color: var(--text-muted); font-weight: bold;" id="round-indicator">奏議：1 / 5</div>
        </div>

        <div class="dragon-throne-center"></div>

        <div class="eunuch-decree-panel">
            <div class="eunuch-avatar">👨‍🦳</div>
            <div class="decree-body">
                <div id="decree-tag" style="font-size: 0.75rem; color: #000; background: var(--accent-gold); padding: 1px 5px; font-weight: bold; display: inline-block; margin-bottom: 4px;">太監宣旨</div>
                <div class="decree-title" id="decree-title">載入中...</div>
                <div class="decree-text" id="decree-text">正在召集群臣商議國事...</div>
            </div>
        </div>

        <div class="court-advisors-floor" id="advisors-floor">
            </div>

        <div id="history-modal" class="history-modal">
            <div class="modal-box">
                <div class="modal-title">📜 太史公歷史鏡鑑</div>
                <div id="modal-body-content" class="modal-body"></div>
                <button class="modal-close-btn" onclick="nextTurn()">朕已知曉得失</button>
            </div>
        </div>

    </div>

    <script>
        // 📦 歷史事件資料庫
        const scenarios = [
            {
                title: "論開國宗廟與法統制",
                desc: "新朝初建，百廢待興。群臣就如何確立本朝法統、祭祀前朝皇帝引發激烈爭論。這關乎天下讀書人的歸心與政權合法性。",
                options: [
                    {
                        type: "civil", role: "白鬍子文官", name: "禮部尚書 · 獨孤信",
                        quote: "「當承漢唐大統，尊前朝先帝為客，廣修文廟，宣揚我朝仁德，則天下文人歸心！」",
                        effects: { politics: 15, economy: -5, defense: 0 },
                        history: "<b>歷史鏡鑑：</b>此舉類似<b>漢高祖劉邦</b>廣納儒生、或<b>清初多爾袞</b>為明崇禎帝發喪。迅速安撫了舊臣與士大夫，使政治快速穩定，但修繕開支不菲。"
                    },
                    {
                        type: "military", role: "黑臉披甲武將", name: "開國勛貴 · 擴廓將軍",
                        quote: "「新朝當文武分明！前朝乃亡國之君，應拆其舊廟，沒收田產充實國庫，重賞有功將士！」",
                        effects: { politics: -10, economy: 15, defense: 15 },
                        history: "<b>歷史鏡鑑：</b>此舉重現了<b>明太祖朱元璋</b>立國初期排斥前朝遺風的強硬作風。雖能快速激勵軍隊並充實財政，但容易激化前朝遺民的反抗。"
                    }
                ]
            },
            {
                title: "江南茶鹽專賣官營議",
                desc: "帝國步入守成期，開支日漸龐大。戶部上奏，南方私茶私鹽氾濫，國家稅收流失严重，建議收歸官營，嚴禁民間私販。",
                options: [
                    {
                        type: "censor", role: "清瘦御史大夫", name: "御史大夫 · 桑大人",
                        quote: "「山海之利，朝廷當總攬之！茶鹽專賣可使國庫年增百萬，以此軍費撥付邊防，此乃利國之舉。」",
                        effects: { politics: -10, economy: 20, defense: 10 },
                        history: "<b>歷史鏡鑑：</b>此法源於<b>漢武帝之鹽鐵官營</b>。短期內能讓中央財政暴增、強力支持邊境軍事，但官吏易滋生貪腐，民間亦會因吃貴鹽而產生怨言。"
                    },
                    {
                        type: "civil", role: "白鬍子文官", name: "太傅 · 董儒師",
                        quote: "「朝廷豈可與民爭利？官營茶鹽致使商賈失業、百姓困苦。當藏富於民，開放民營，僅課微稅。」",
                        effects: { politics: 15, economy: -15, defense: -5 },
                        history: "<b>歷史鏡鑑：</b>這重現了漢代<b>《鹽鐵論》</b>中儒家賢良文學的觀點。開放民營能極大地贏得民心與文治聲望，但國家財政將陷入拮据，邊防武備可能因缺餉而廢弛。"
                    }
                ]
            }
        ];

        let stats = { politics: 50, economy: 50, defense: 50 };
        let round = 0;
        let selectedEffect = null;
        let selectedHistory = "";

        function updateHUD() {
            document.getElementById("round-indicator").innerText = `奏議：${round + 1} / ${scenarios.length}`;
            ["politics", "economy", "defense"].forEach(s => {
                stats[s] = Math.min(100, Math.max(0, stats[s]));
                document.getElementById(`v-${s}`).innerText = stats[s];
                document.getElementById(`b-${s}`).style.width = stats[s] + '%';
            });
        }

        function renderScenario() {
            if (round >= scenarios.length) {
                triggerEnding();
                return;
            }
            updateHUD();
            const current = scenarios[round];
            document.getElementById("decree-title").innerText = current.title;
            document.getElementById("decree-text").innerText = current.desc;

            const floor = document.getElementById("advisors-floor");
            floor.innerHTML = ""; // 清空上一輪

            // 建立懸浮奏摺面板
            const scroll = document.createElement("div");
            scroll.className = "proposal-scroll-popup";
            scroll.id = "scroll-popup";
            scroll.innerHTML = `
                <div class="proposal-text" id="p-quote"></div>
                <div class="proposal-preview-bars" id="p-eff"></div>
                <button class="action-confirm-btn" id="p-submit">准奏（天子御批）</button>
                <div class="seal-stamp" id="seal-stamp">御批</div>
            `;
            floor.appendChild(scroll);

            // 渲染大臣立繪
            current.options.forEach(opt => {
                const card = document.createElement("div");
                card.className = `advisor-silhouette tg-${opt.type}`;
                card.innerHTML = `
                    <div class="advisor-figure"></div>
                    <div class="advisor-label">
                        <div class="label-role">${opt.role}</div>
                        <div class="label-name">${opt.name}</div>
                    </div>
                `;

                // ⚡ 點擊大臣：觸發互動反饋（跨步放大、其他退下）
                card.onclick = (e) => {
                    e.stopPropagation();
                    
                    // 移除之前選中，進入群臣退下狀態
                    document.querySelectorAll(".advisor-silhouette").forEach(c => c.classList.remove("stepped-forward"));
                    floor.classList.add("has-active-selection");
                    card.classList.add("stepped-forward");

                    // 填充並彈出奏摺
                    document.getElementById("p-quote").innerText = opt.quote;
                    const effBox = document.getElementById("p-eff");
                    effBox.innerHTML = "";
                    
                    const dict = { politics: "政治", economy: "經濟", defense: "國防" };
                    Object.keys(opt.effects).forEach(k => {
                        let val = opt.effects[k];
                        if(val === 0) return;
                        let node = document.createElement("span");
                        node.className = `badge-eff ${val > 0 ? 'badge-up' : 'badge-down'}`;
                        node.innerText = `${dict[k]} ${val > 0 ? '+' : ''}${val}`;
                        effBox.appendChild(node);
                    });

                    selectedEffect = opt.effects;
                    selectedHistory = opt.history;

                    document.getElementById("scroll-popup").classList.add("show");
                };

                floor.appendChild(card);
            });

            // 綁定確認御批事件
            document.getElementById("p-submit").onclick = (e) => {
                e.stopPropagation();
                
                // 蓋章動畫
                const stamp = document.getElementById("seal-stamp");
                stamp.style.animation = "sealPlunge 0.15s ease-out forwards";
                
                // 螢幕震動
                document.getElementById("main-stage").classList.add("shake");

                setTimeout(() => {
                    document.getElementById("main-stage").classList.remove("shake");
                    document.getElementById("modal-body-content").innerHTML = selectedHistory;
                    document.getElementById("history-modal").style.display = "flex";
                }, 300);
            };
        }

        function nextTurn() {
            // 應用數值變更
            stats.politics += selectedEffect.politics;
            stats.economy += selectedEffect.economy;
            stats.defense += selectedEffect.defense;

            document.getElementById("history-modal").style.display = "none";
            document.getElementById("advisors-floor").classList.remove("has-active-selection");
            round++;
            renderScenario();
        }

        function triggerEnding() {
            let total = stats.politics + stats.economy + stats.defense;
            let title = total >= 160 ? "🏆 盛世明君 · 天命長青" : "⚖️ 平庸守成 · 朝代更迭";
            let desc = total >= 160 ? "你成功在政治、經濟與國防之間取得了絕佳的歷史博弈平衡，大華基業延綿萬世！" : "你雖勉力維持，但未能突破治亂興衰的歷史週期律，數十年後帝國沒入歷史洪流。";
            
            document.getElementById("main-stage").innerHTML = `
                <div style="text-align:center; padding-top: 150px; width:600px; margin:0 auto;">
                    <h2 style="color:var(--accent-gold); font-size:1.8rem; margin-bottom:20px;">${title}</h2>
                    <p style="line-height:1.8; color:#f0e6df; background: rgba(0,0,0,0.4); padding:20px; border:1px dashed #5c4028;">${desc}</p>
                    <button onclick="location.reload()" style="background:var(--accent-gold); border:none; padding:10px 30px; font-weight:bold; cursor:pointer; margin-top:20px;">重新執掌天命</button>
                </div>
            `;
        }

        window.onload = renderScenario;
    </script>
</body>
</html>
