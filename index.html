<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天命最高 - Mandate Supreme (方案 B 實體對立版)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        /* 全域重設與背景鎖定 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: #050505;
            color: #e2e8f0;
            font-family: 'Noto Serif TC', serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 1024x768 4:3 復古獨立遊戲視窗 */
        #game-stage {
            width: 1024px;
            height: 768px;
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.5)), 
                        url('http://googleusercontent.com/image_generation_content/3') center/cover;
            border: 5px double #d4af37; /* 皇家暗金雙線邊框 */
            box-shadow: 0 0 50px rgba(0,0,0,0.9), inset 0 0 120px rgba(0,0,0,0.95);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
        }

        /* 殿堂暗角濾鏡 (Vignette) 增加龍椅的明暗對比磅礡感 */
        #game-stage::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 30%, rgba(0, 0, 0, 0.75) 100%);
            pointer-events: none;
            z-index: 5;
        }

        .panel {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .hidden { display: none !important; }

        /* ==========================================
           1. 頂部金色 HUD 資源列
           ========================================== */
        .hud-header {
            width: 100%;
            height: 75px;
            background: linear-gradient(180deg, rgba(15, 10, 5, 0.98) 0%, rgba(30, 22, 12, 0.88) 100%);
            border-bottom: 2px solid #d4af37;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.6);
            z-index: 20;
        }

        .hud-turn {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 26px;
            color: #ffd700;
            border-right: 1px solid #4a351a;
            padding-right: 20px;
            text-shadow: 1px 1px 2px #000;
        }

        .stat-box {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 170px;
        }

        .stat-icon {
            font-size: 20px;
            width: 34px; height: 34px;
            background: #23150b;
            border: 1px solid #d4af37;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffd700;
            box-shadow: 0 0 6px rgba(212, 175, 55, 0.4);
        }

        .stat-body { flex-grow: 1; }

        .stat-label-container {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #e2e8f0;
            margin-bottom: 3px;
            font-weight: bold;
            text-shadow: 1px 1px 2px #000;
        }

        .stat-bar-bg {
            width: 100%; height: 8px;
            background: #111;
            border: 1px solid #4a351a;
            border-radius: 4px;
            overflow: hidden;
        }

        .stat-bar-fill {
            height: 100%; width: 50%;
            background: linear-gradient(90deg, #8b0000, #d4af37);
            transition: width 0.4s ease-out;
        }

        /* ==========================================
           2. 核心舞台：朝堂核心區
           ========================================== */
        .court-stage {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            padding: 25px 40px;
            z-index: 15;
        }

        .empire-banner {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 38px;
            color: #ffffff;
            letter-spacing: 10px;
            text-shadow: 0 0 15px rgba(212,175,55,0.6), 2px 2px 4px #000;
            margin-bottom: 20px;
        }

        /* 2.1 描金捲軸大政背景 */
        .scroll-container {
            width: 780px;
            background: linear-gradient(180deg, rgba(28, 20, 12, 0.95) 0%, rgba(18, 12, 7, 0.98) 100%);
            border: 2px solid #d4af37;
            border-radius: 4px;
            padding: 25px 45px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.8);
            text-align: center;
            position: relative;
            margin-bottom: 35px;
        }

        /* 捲軸古典裝飾細線 */
        .scroll-container::before, .scroll-container::after {
            content: '';
            position: absolute;
            left: 15px; right: 15px; height: 1px;
            background: linear-gradient(90deg, transparent, #d4af37, transparent);
        }
        .scroll-container::before { top: 8px; }
        .scroll-container::after { bottom: 8px; }

        .scroll-title {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 26px;
            color: #ffd700;
            margin-bottom: 12px;
            letter-spacing: 2px;
        }

        .scroll-desc {
            font-size: 18px;
            line-height: 1.6;
            color: #f0e6d2;
            text-align: justify;
        }

        /* 2.2 左右/橫向博弈的實體奏折卡片區 (方案 B 三路分歧) */
        .proposals-grid {
            width: 880px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            align-items: flex-start;
        }

        .memorial-card {
            background: linear-gradient(180deg, rgba(40, 30, 20, 0.95) 0%, rgba(20, 15, 10, 0.98) 100%);
            border: 2px solid #8b6c3f;
            border-radius: 4px;
            padding: 20px 15px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.7);
            transition: all 0.25s ease;
            position: relative;
            text-align: center;
            min-height: 190px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        /* 奏折派系標籤 */
        .memorial-tag {
            position: absolute;
            top: -11px; left: 50%;
            transform: translateX(-50%);
            padding: 1px 12px;
            font-size: 12px;
            font-weight: bold;
            border-radius: 10px;
            border: 1px solid #d4af37;
            box-shadow: 0 3px 6px rgba(0,0,0,0.5);
        }
        .tag-civil { background: #1a365d; color: #63b3ed; border-color: #3182ce; }
        .tag-eco { background: #2d3748; color: #f6ad55; border-color: #dd6b20; }
        .tag-military { background: #5c1d1d; color: #fc8181; border-color: #e53e3e; }

        .memorial-icon {
            font-size: 24px;
            margin-top: 8px;
            margin-bottom: 5px;
        }
        .tag-civil ~ .memorial-icon { color: #63b3ed; }
        .tag-eco ~ .memorial-icon { color: #f6ad55; }
        .tag-military ~ .memorial-icon { color: #fc8181; }

        .memorial-author {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 20px;
            color: #f0e6d2;
            margin-bottom: 8px;
            border-bottom: 1px solid #4a351a;
            padding-bottom: 4px;
        }

        .memorial-text {
            font-size: 15px;
            line-height: 1.5;
            color: #cbd5e1;
            text-align: left;
        }

        /* 方案 B 朝堂向前跨步與高亮動畫 */
        .memorial-card:hover {
            transform: translateY(-10px);
            border-color: #ffd700;
            box-shadow: 0 15px 30px rgba(255, 215, 0, 0.2);
            background: linear-gradient(180deg, rgba(55, 40, 25, 0.98) 0%, rgba(25, 18, 12, 1) 100%);
        }

        /* ==========================================
           3. 底部宣紙編年史日誌
           ========================================== */
        .chronicle-log-bar {
            width: 100%;
            height: 45px;
            background: linear-gradient(90deg, #100a05 0%, #1a120b 50%, #100a05 100%);
            border-top: 2px solid #d4af37;
            display: flex;
            align-items: center;
            padding: 0 30px;
            font-size: 15px;
            color: #a0aec0;
            z-index: 20;
            letter-spacing: 1px;
            text-shadow: 1px 1px 2px #000;
        }
        .chronicle-log-bar i {
            color: #ffd700;
            margin-right: 12px;
            font-size: 16px;
        }

        /* ==========================================
           4. 遊戲加載與選單 (Flash 緩衝風格)
           ========================================== */
        #loading-panel, #menu-panel, #gameover-panel {
            justify-content: center;
            align-items: center;
            background: rgba(10, 7, 5, 0.85);
        }

        #loading-panel { background: #0d0d0d; }
        
        .menu-title {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 88px;
            color: #ffd700;
            text-shadow: 0 0 30px rgba(212,175,55,0.5), 3px 3px 0px #8b0000;
            margin-bottom: 60px;
            letter-spacing: 12px;
        }

        .royal-btn {
            background: linear-gradient(180deg, #4a0d0d 0%, #220505 100%);
            border: 2px solid #d4af37;
            color: #f0e6d2;
            padding: 14px 45px;
            font-size: 22px;
            font-family: 'Noto Serif TC', serif;
            font-weight: bold;
            letter-spacing: 6px;
            cursor: pointer;
            box-shadow: 0 8px 16px rgba(0,0,0,0.6);
            transition: all 0.2s ease;
            border-radius: 2px;
        }
        .royal-btn:hover {
            transform: translateY(-2px);
            background: linear-gradient(180deg, #6b1515 0%, #3a0808 100%);
            border-color: #ffffff;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
        }

        /* 經典加載條 */
        .loader-box { width: 400px; text-align: center; }
        .loader-bg { width: 100%; height: 10px; background: #111; border: 1px solid #444; border-radius: 5px; overflow: hidden; margin-bottom: 12px; }
        .loader-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #8b0000, #d4af37); transition: width 0.1s linear; }

        /* ==========================================
           5. 結局畫面與環境震動
           ========================================== */
        .go-title { font-family: 'Ma Shan Zheng', cursive; font-size: 68px; color: #e53e3e; margin-bottom: 15px; }
        .go-reason { font-size: 24px; color: #ffd700; font-family: 'Ma Shan Zheng', cursive; margin-bottom: 35px; }
        .go-desc-box { width: 680px; background: rgba(15, 10, 8, 0.95); border: 1px solid #d4af37; padding: 25px; text-align: justify; margin-bottom: 40px; line-height: 1.6; }

        @keyframes screenShake {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            20% { transform: translate(-3px, 2px) rotate(-0.5deg); }
            40% { transform: translate(3px, -1px) rotate(0.5deg); }
            60% { transform: translate(-2px, -2px) rotate(0deg); }
            80% { transform: translate(2px, 1px) rotate(0.5deg); }
        }
        .shake-active { animation: screenShake 0.35s ease-in-out; }
    </style>
</head>
<body>

    <div id="game-stage">
        
        <div id="loading-panel" class="panel">
            <h1 class="menu-title" style="font-size: 72px; margin-bottom: 30px;">天命最高</h1>
            <div class="loader-box">
                <div class="loader-bg"><div id="loader-fill" class="loader-fill"></div></div>
                <div id="loader-msg" style="font-size: 14px; color: #a0aec0; letter-spacing: 2px;">正推開金鑾殿大門...</div>
            </div>
        </div>

        <div id="menu-panel" class="panel hidden">
            <h1 class="menu-title">天命最高</h1>
            <button class="royal-btn" onclick="startGame()">執掌天命</button>
        </div>

        <div id="game-panel" class="panel hidden">
            <div class="hud-header">
                <div id="hud-turn-display" class="hud-turn">宣德 元年</div>
                
                <div class="stat-box">
                    <div class="stat-icon"><i class="fa-solid fa-scroll"></i></div>
                    <div class="stat-body">
                        <div class="stat-label-container"><span>政治</span><span id="val-pol">50</span></div>
                        <div class="stat-bar-bg"><div id="bar-pol" class="stat-bar-fill"></div></div>
                    </div>
                </div>

                <div class="stat-box">
                    <div class="stat-icon"><i class="fa-solid fa-coins"></i></div>
                    <div class="stat-body">
                        <div class="stat-label-container"><span>經濟</span><span id="val-eco">50</span></div>
                        <div class="stat-bar-bg"><div id="bar-eco" class="stat-bar-fill"></div></div>
                    </div>
                </div>

                <div class="stat-box">
                    <div class="stat-icon"><i class="fa-solid fa-shield-halved"></i></div>
                    <div class="stat-body">
                        <div class="stat-label-container"><span>國防</span><span id="val-mil">50</span></div>
                        <div class="stat-bar-bg"><div id="bar-mil" class="stat-bar-fill"></div></div>
                    </div>
                </div>

                <div class="stat-box">
                    <div class="stat-icon"><i class="fa-solid fa-book-open"></i></div>
                    <div class="stat-body">
                        <div class="stat-label-container"><span>文化</span><span id="val-cul">50</span></div>
                        <div class="stat-bar-bg"><div id="bar-cul" class="stat-bar-fill"></div></div>
                    </div>
                </div>
            </div>

            <div class="court-stage">
                <div class="empire-banner">👑 大華帝國 · 奉天承運</div>
                
                <div class="scroll-container">
                    <h2 id="current-event-title" class="scroll-title">當前朝政大政</h2>
                    <p id="current-event-desc" class="scroll-desc">聽取三方執政代表呈遞御批奏折...</p>
                </div>

                <div class="proposals-grid">
                    <div class="memorial-card" onclick="makeChoice(0)">
                        <div class="memorial-tag tag-civil">📜 主和派奏折</div>
                        <div class="memorial-icon"><i class="fa-solid fa-feather-pointed"></i></div>
                        <div class="memorial-author">文華殿大學士</div>
                        <p id="prop-civil" class="memorial-text">載入中...</p>
                    </div>

                    <div class="memorial-card" onclick="makeChoice(1)">
                        <div class="memorial-tag tag-eco">📜 權宜派奏折</div>
                        <div class="memorial-icon"><i class="fa-solid fa-scale-balanced"></i></div>
                        <div class="memorial-author">戶部尚書</div>
                        <p id="prop-eco" class="memorial-text">載入中...</p>
                    </div>

                    <div class="memorial-card" onclick="makeChoice(2)">
                        <div class="memorial-tag tag-military">📜 主戰派奏折</div>
                        <div class="memorial-icon"><i class="fa-solid fa-sword"></i></div>
                        <div class="memorial-author">兵部大將軍</div>
                        <p id="prop-military" class="memorial-text">載入中...</p>
                    </div>
                </div>
            </div>

            <div id="history-bar-log" class="chronicle-log-bar">
                <i class="fa-solid fa-pen-nib"></i> 宣德元年，聖上登基，四海昇平，萬象更新。
            </div>
        </div>

        <div id="gameover-panel" class="panel hidden">
            <h1 id="go-title-text" class="go-title">天命崩解</h1>
            <div id="go-reason-text" class="go-reason">權力失衡，江山易主</div>
            <div class="go-desc-box">
                <p id="go-summary-text">大華歷史至此發生偏折。聖上在位期間未能調和朝堂文武，天命旁落，留下了無盡的歷史遺憾...</p>
            </div>
            <button class="royal-btn" onclick="restartGame()">重新登基</button>
        </div>

    </div>

    <script>
        let stats = { pol: 50, eco: 50, mil: 50, cul: 50 };
        let currentTurn = 1;
        let eventPool = [];
        let currentEvent = null;

        // 利用 Web Audio API 免外部文件生成玉璽重音與點擊反饋
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(isSeal) {
            try {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                if (isSeal) {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(95, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.35);
                    gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
                } else {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                    gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                }
                gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.3);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.35);
            } catch(e) {}
        }

        // 加載畫面進度模擬
        window.addEventListener('DOMContentLoaded', () => {
            let fill = document.getElementById('loader-fill');
            let msg = document.getElementById('loader-msg');
            let progress = 0;
            let txts = ["推開金鑾大門...", "整肅朝臣衣冠...", "鋪設天子案前奏折...", "天命已至！"];
            
            let timer = setInterval(() => {
                progress += 2;
                fill.style.width = progress + '%';
                if(progress === 30) msg.innerText = txts[1];
                if(progress === 65) msg.innerText = txts[2];
                if(progress === 90) msg.innerText = txts[3];
                if(progress >= 100) {
                    clearInterval(timer);
                    document.getElementById('loading-panel').classList.add('hidden');
                    document.getElementById('menu-panel').classList.remove('hidden');
                }
            }, 25);
        });

        // 核心 3 選項歷史事件池
        const baseEvents = [
            {
                title: "匈奴突襲寇邊",
                desc: "邊關十萬火急！北面匈奴趁大寒南下狂飆掠奪，已連破我朝九邊兩處哨口，守軍告急！",
                choices: [
                    { txt: "「割地和親、增修互市，遣使修好以文德懷遠。」", effect: { pol: 15, eco: -15, mil: -10, cul: 15 }, log: "聖上決定增開互市懷柔北疆，文官讚譽仁德，但邊防愈發虛弱。" },
                    { txt: "「暫緩出兵，徵調邊郡富商承包鹽利以籌集防禦加固軍費。」", effect: { pol: -5, eco: 20, mil: 5, cul: -5 }, log: "戶部通過讓利商賈籌集了防禦銀兩，暫時穩固政局但民生微怨。" },
                    { txt: "「發兵迎擊！點將十萬迎戰，大破匈奴以正國威！」", effect: { pol: -10, eco: -25, mil: 25, cul: -5 }, log: "天子出兵！大將軍親率精騎北伐大勝，武備大振，但國庫開支甚巨。" }
                ]
            },
            {
                title: "黃河突發大決堤",
                desc: "山東遭遇連日罕見暴雨，黃河數處長堤同時崩塌決口，數十萬流民無家可歸，賑災刻不容緩。",
                choices: [
                    { txt: "「派翰林儒生開倉放糧、安撫難民，倡導仁政慈悲。」", effect: { pol: 15, eco: -15, mil: 0, cul: 15 }, log: "儒生全面介入發放公糧，災區民心大定，朝野稱頌聖上聖德。" },
                    { txt: "「允許地方豪強承包河道修築，賜予鬻爵免稅權換取賑災現銀。」", effect: { pol: -10, eco: 25, mil: -5, cul: -5 }, log: "通過售賣名譽官職迅速籌得巨資，國庫充盈，但損害了考課法度。" },
                    { txt: "「出動地方守備軍強力封鎖災區，徵用壯丁強行修堤，彈壓騷亂。」", effect: { pol: -5, eco: -5, mil: 20, cul: -10 }, log: "守備軍實施鐵腕管制與強制修堤，雖然效率極高，但朝堂氣氛壓抑。" }
                ]
            },
            {
                title: "江南科場舞弊案",
                desc: "江南鄉試爆出驚天醜聞，主考官涉嫌收受鹽商巨額賄賂，向特定豪門子弟洩漏試題。",
                choices: [
                    { txt: "「由禮部重新開科，重申儒家公正，洗刷讀書人恥辱。」", effect: { pol: 20, eco: -5, mil: 0, cul: 15 }, log: "重新開科維護了仕子公正，文人學子無不感激涕零，天下文風大盛。" },
                    { txt: "「將涉案豪商處以巨額罰銀，沒收財產入國庫，涉案官員降職。」", effect: { pol: -10, eco: 30, mil: -5, cul: -10 }, log: "聖上沒收貪墨資產，國庫瞬間爆滿，但科舉威信下降引發士林不滿。" },
                    { txt: "「此乃動搖國本！著兵部與特務機構介入，通通滿門抄斬。」", effect: { pol: 10, eco: -5, mil: 20, cul: -15 }, log: "雷霆手段！武將和特務全面血洗江南官場，殺一儆百，軍威震懾朝廷。" }
                ]
            }
        ];

        function startGame() {
            playSound(false);
            document.getElementById('menu-panel').classList.add('hidden');
            document.getElementById('game-panel').classList.remove('hidden');
            stats = { pol: 50, eco: 50, mil: 50, cul: 50 };
            currentTurn = 1;
            eventPool = [...baseEvents];
            updateHUD();
            nextEvent();
        }

        function updateHUD() {
            document.getElementById('hud-turn-display').innerText = `宣德 ${convertToChineseYear(currentTurn)}年`;
            const keys = ['pol', 'eco', 'mil', 'cul'];
            keys.forEach(k => {
                document.getElementById(`val-${k}`).innerText = stats[k];
                document.getElementById(`bar-${k}`).style.width = stats[k] + '%';
                // 臨界預警顏色變更
                document.getElementById(`bar-${k}`).style.background = stats[k] <= 20 ? 
                    "linear-gradient(90deg, #ff0000, #8b0000)" : "linear-gradient(90deg, #8b0000, #d4af37)";
            });
        }

        function convertToChineseYear(num) {
            const arr = ["", "元", "二", "三", "四", "五", "六", "七", "八", "九", "十"];
            return num <= 10 ? arr[num] : num;
        }

        function nextEvent() {
            if(eventPool.length === 0) eventPool = [...baseEvents];
            let idx = Math.floor(Math.random() * eventPool.length);
            currentEvent = eventPool.splice(idx, 1)[0];

            document.getElementById('current-event-title').innerText = `當前朝政大政 · ${currentEvent.title}`;
            document.getElementById('current-event-desc').innerText = currentEvent.desc;

            // 渲染 3 選項至實體奏折中
            document.getElementById('prop-civil').innerText = currentEvent.choices[0].txt;
            document.getElementById('prop-eco').innerText = currentEvent.choices[1].txt;
            document.getElementById('prop-military').innerText = currentEvent.choices[2].txt;
        }

        function makeChoice(index) {
            // 觸發物理蓋章打擊感與視窗震動
            playSound(true);
            const stage = document.getElementById('game-stage');
            stage.classList.add('shake-active');
            setTimeout(() => stage.classList.remove('shake-active'), 350);

            let choice = currentEvent.choices[index];
            for(let key in choice.effect) {
                stats[key] = Math.max(0, Math.min(100, stats[key] + choice.effect[key]));
            }

            // 更新宣紙歷史日誌
            document.getElementById('history-bar-log').innerHTML = `<i class="fa-solid fa-pen-nib"></i> 宣德${convertToChineseYear(currentTurn)}年：${choice.log}`;
            updateHUD();

            if (checkGameOver()) return;

            currentTurn++;
            setTimeout(nextEvent, 500); // 留白半秒，讓玩家看清國力條滑動增減
        }

        function checkGameOver() {
            let dead = false; let reason = ""; let sum = "";

            if (stats.pol <= 0) {
                reason = "【政治清明歸零 · 朝臣架空】";
                sum = "聖上在位期間權臣勾結、朋黨之爭橫行。內閣與文官集團聯手發動逼宮，奪走了皇權玉璽，您被軟禁於瀛台，大華江山就此易主。";
                dead = true;
            } else if (stats.eco <= 0) {
                reason = "【經濟生產歸零 · 財政崩潰】";
                sum = "國庫徹底掏空，邊防軍餉與百官俸祿常年無法發放。山東與江南同時爆發百萬流民起義，叛軍攻陷京師，大華宣德朝宣告覆滅。";
                dead = true;
            } else if (stats.mil <= 0) {
                reason = "【國防武備歸零 · 外敵破關】";
                sum = "朝廷極度重文輕武，九邊重鎮武備荒廢。匈奴三十萬鐵騎趁夜破關長驅直入，攻破紫禁城，聖上被迫自縊於景山，天命就此斷絕。";
                dead = true;
            } else if (stats.cul <= 0) {
                reason = "【文化傳承歸零 · 禮崩樂壞】";
                sum = "帝國一味推行商業壓榨或鐵腕軍事清洗，導致天下斯文掃地、禮崩樂壞。朝廷喪失了合法性，各地宗室紛紛打著清君側旗號舉兵，天下大亂。";
                dead = true;
            } else if (currentTurn >= 10) {
                // 通關成功條件
                document.getElementById('game-panel').classList.add('hidden');
                document.getElementById('gameover-panel').classList.remove('hidden');
                document.getElementById('go-title-text').innerText = "✨ 天命最高 ✨";
                document.getElementById('go-reason-text').innerText = "【功蓋千秋 · 打造萬世盛世】";
                document.getElementById('go-summary-text').innerText = "聖上在位十載，文治武功皆臻化境！朝堂政治海晏河清，國庫流金充盈，北疆百戰伏首，文化萬邦來朝。大華帝國成功延續了至高天命，史稱「宣德盛世」！";
                return true;
            }

            if (dead) {
                document.getElementById('game-panel').classList.add('hidden');
                document.getElementById('gameover-panel').classList.remove('hidden');
                document.getElementById('go-title-text').innerText = "天命崩解";
                document.getElementById('go-reason-text').innerText = reason;
                document.getElementById('go-summary-text').innerText = sum;
                return true;
            }
            return false;
        }

        function restartGame() {
            document.getElementById('gameover-panel').classList.add('hidden');
            startGame();
        }
    </script>
</body>
</html>
